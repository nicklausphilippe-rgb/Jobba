// ── Claude API ────────────────────────────────────────────────────────────────
async function analyzeJob(cvBase64, cvType, jobText) {
  const sys = `Du bist ein nüchterner, realistischer Karriere-Assistent. Analysiere eine Stellenausschreibung anhand eines Lebenslaufs.
Antworte NUR mit validem JSON, ohne Markdown oder Backticks.

Schema: {"firma":"","rolle":"","standort":"Konkrete Stadt aus Anzeige, z.B. Frankfurt oder Muenchen/Berlin oder Remote. NIEMALS nur Deutschland/Germany - immer spezifische Stadt(e), mit / getrennt falls mehrere. Falls wirklich keine Stadt erwaehnt: Remote","gehalt":"geschaetztes Jahresgehalt z.B. 60000-75000 EUR","fit":0,"offerChance":0,"begruendung":"2-3 Saetze"}

Bewertungsregeln – halte diese strikt ein:

CV-FIT (0-100): Reiner, nüchterner Abgleich des CVs mit den geforderten Aufgaben, Qualifikationen und Seniorität der Stelle.
- 80-100: CV erfüllt nahezu alle Anforderungen inkl. Seniorität
- 60-79: CV passt gut, kleinere Lücken
- 40-59: CV passt teilweise, relevante Lücken vorhanden
- 20-39: CV passt nur bedingt, größere Lücken
- 0-19: CV passt kaum

OFFER-WAHRSCHEINLICHKEIT (0-100): Realistische Chance, ein Angebot zu erhalten.
Bestimme zuerst die Unternehmenskategorie, dann passe mit CV-Fit an.

Basis-Ranges nach Unternehmenstyp (bei ~75% CV-Fit):
- Globale Top-Konzerne, sehr hohes Bewerbervolumen (Google, Meta, McKinsey, P&G, Unilever, Visa): 5–10%
- Große bekannte Marken / Finanzkonzerne (Amex, Mastercard, Lufthansa, Deloitte, PwC, Revolut): 8–18%
- Bekannte mittelgroße Unternehmen / Medien / Scale-ups (RTL, ProSieben, About You, Scalable, CHECK24, TUI): 12–25%
- Regionaler Mittelstand, kleinere Firmen, Nischenanbieter (BAUHAUS, HSV, SNP, Obungi, lokale Agenturen): 20–40%
- Sehr kleine Firmen / wenig Bewerber: 30–55%

Anpassung nach CV-Fit:
- Fit > 80%: Basis +5 bis +8 Prozentpunkte
- Fit 60-80%: Basis unverändert
- Fit 40-60%: Basis -5 bis -10 Prozentpunkte
- Fit < 40%: Basis -15 bis -20 Prozentpunkte

Sei konservativ. Gib immer einen einzelnen Mittelwert aus, keine Range.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: sys,
      messages: [{
        role: "user",
        content: [
          { type: "document", source: { type: "base64", media_type: cvType || "application/pdf", data: cvBase64 } },
          { type: "text", text: `Stellenausschreibung:\n\n${jobText}\n\nBitte analysieren und mit dem Lebenslauf abgleichen.` }
        ]
      }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({error:{message:"Unbekannter Fehler"}}));
    throw new Error(err.error?.message || "API Fehler");
  }
  const data = await res.json();
  const raw = data.content?.map(i=>i.text||"").join("") || "";
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

  useEffect(() => {
    const j = loadData(JOBS_KEY);

  }, []);

  useEffect(() => { if (loaded) saveData(JOBS_KEY, jobs); }, [jobs, loaded]);
  useEffect(() => { if (loaded) saveData(DOCS_KEY, docs); }, [docs, loaded]);
  useEffect(() => { if (loaded && cv) saveData(CV_KEY, cv); }, [cv, loaded]);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null), 2800); }

  function saveJob(job) {
    if (job.id) {
      setJobs(j=>j.map(x=>x.id===job.id?job:x));
      setDetailJob(job);
      setView("detail");
    } else {
      const newJob = {...job, id:uid()};
      if (job.status==="Beworben" && !job.datum) newJob.datum = today();
      setJobs(j=>[...j, newJob]);
      setView("dashboard");
    }
    showToast("Gespeichert ✓");
  }

  function deleteJob(id) {
    setJobs(j=>j.filter(x=>x.id!==id));
    setDetailJob(null); setView("dashboard");
    showToast("Gelöscht");
  }

  function updateStatus(id, status) {
    setJobs(j=>j.map(x=>{
      if (x.id!==id) return x;
      const updates = {status};
      if (status==="Beworben" && !x.datum) updates.datum = today();
      return {...x,...updates};
    }));
  }

  if (!loaded) return <Splash />;
  if (!cv) return <CvOnboarding onDone={c=>{setCv(c);showToast("Lebenslauf gespeichert ✓");}} />;

  return (
    <div style={{background:B.darkest,minHeight:"100vh",color:B.text}}>
      <header style={{padding:"calc(env(safe-area-inset-top) + 14px) 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${B.border}`,position:"sticky",top:0,background:B.darkest,zIndex:100}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <JobbaLogo size={36}/>
          <div style={{fontSize:11,color:B.muted}}>{jobs.length} Jobs · {jobs.filter(j=>j.status==="Interview").length} Interviews</div>
        </div>
        <button onClick={()=>setView("add")} style={{width:38,height:38,borderRadius:12,background:B.greenDark,border:"none",color:"#fff",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,paddingBottom:2}}>＋</button>
      </header>

      <nav style={{display:"flex",borderTop:`1px solid ${B.border}`,position:"fixed",bottom:0,left:0,right:0,background:B.darkest,zIndex:99,maxWidth:430,margin:"0 auto",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {[{id:"dashboard",icon:"☰",l:"Liste"},{id:"kanban",icon:"⊞",l:"Board"},{id:"stats",icon:"◎",l:"Stats"},{id:"suche",icon:"⌕",l:"Suche"},{id:"docs",icon:"◫",l:"Docs"}].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"12px 2px 10px",background:"none",border:"none",
            color:view===t.id?B.green:B.muted,fontSize:11,cursor:"pointer",display:"flex",flexDirection:"column",
            alignItems:"center",gap:3,borderTop:view===t.id?`2px solid ${B.green}`:"2px solid transparent"}}>
            <span style={{fontSize:17}}>{t.icon}</span><span>{t.l}</span>
          </button>
        ))}
      </nav>

      <main style={{padding:16,paddingBottom:90}}>
        {view==="dashboard" && <DashboardView jobs={jobs} filterStatus={filterStatus} setFilterStatus={setFilterStatus} onDetail={j=>{setDetailJob(j);setView("detail");}}/>}
        {view==="kanban"    && <KanbanView jobs={jobs} onDetail={j=>{setDetailJob(j);setView("detail");}} updateStatus={updateStatus}/>}
        {view==="stats"     && <StatsView     jobs={jobs}/>}
        {view==="suche"     && <SucheView onAnalyze={text=>{window._prefillText=text; setView("add_prefill");}}/>}
        {view==="docs"      && <DocsView      docs={docs} setDocs={setDocs} cv={cv} setCv={setCv} showToast={showToast}/>}
        {view==="add"       && <AddJobView cv={cv} onSave={saveJob} onCancel={()=>setView("dashboard")}/>}
        {view==="add_prefill" && <AddJobView cv={cv} prefill={window._prefillText||""} onSave={job=>{window._prefillText=null; saveJob(job);}} onCancel={()=>setView("suche")}/>}
        {view==="detail" && detailJob && (
          <DetailView job={jobs.find(j=>j.id===detailJob.id)||detailJob}
            onDelete={deleteJob} onBack={()=>setView("dashboard")} updateStatus={updateStatus}
            onAnschreiben={j=>{setAnschreibenJob(j);setView("anschreiben");}}
            onEdit={j=>{setEditJob(j);setView("edit");}}
            onInterview={j=>{setInterviewJob(j);setView("interview");}}/>
        )}
        {view==="anschreiben" && anschreibenJob && (
          <AnschreibenView job={anschreibenJob} cv={cv} onBack={()=>setView("detail")}
            onSave={(id,text)=>setJobs(j=>j.map(x=>x.id===id?{...x,anschreiben:text}:x))}/>
        )}
        {view==="interview" && interviewJob && (
          <InterviewView job={interviewJob} cv={cv} onBack={()=>setView("detail")}
            onSavePrep={(id,sections)=>setJobs(j=>j.map(x=>x.id===id?{...x,interviewPrep:sections}:x))}/>
        )}
        {view==="edit" && editJob && (
          <EditJobView job={editJob} onSave={saveJob} onCancel={()=>setView("detail")} onDelete={id=>{deleteJob(id);setView("dashboard");}}/>
        )}
      </main>

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
        background:B.dark,border:`1px solid ${B.greenDark}`,color:B.green,padding:"10px 22px",
        borderRadius:22,fontSize:13,zIndex:9999,whiteSpace:"nowrap",animation:"toastIn .25s ease"}}>{toast}</div>}
    </div>
  );
}

function JobbaLogo({size=40}) {
  // size maps to height; aspect ratio ~1.167 (w/h of original)
  const h = size;
  const w = Math.round(size * 1.167);
  return <img src={LOGO_SMALL} height={h} width={w} alt="Jobba" style={{display:"block"}}/>;
}

function JobbaLogoLarge() {
  return <img src={LOGO_MEDIUM} height={120} alt="Jobba" style={{display:"block"}}/>;
}

function Splash() {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:B.darkest,gap:12}}>
      <JobbaLogoLarge/><p style={{color:B.muted,fontSize:13}}>Lade…</p>
    </div>
  );
}

// ── CV Onboarding ─────────────────────────────────────────────────────────────
function CvOnboarding({onDone}) {
  const ref = useRef();
  const [busy, setBusy] = useState(false);
  function handle(e) {
    const file=e.target.files[0]; if(!file) return;
    setBusy(true);
    const r=new FileReader();
    r.onload=ev=>{
      const du=ev.target.result;
      onDone({name:file.name,type:file.type,data:du.split(",")[1],dataUrl:du,datum:today()});
      setBusy(false);
    };
    r.readAsDataURL(file);
    e.target.value="";
  }
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      minHeight:"100vh",padding:32,background:B.darkest,textAlign:"center"}}>
      <JobbaLogoLarge/>
      <div style={{marginTop:20,marginBottom:8,fontSize:24,fontWeight:800}}>Willkommen bei Jobba</div>
      <div style={{color:B.muted,fontSize:14,lineHeight:1.7,marginBottom:32,maxWidth:300}}>
        Lade zuerst deinen <strong style={{color:B.green}}>Lebenslauf</strong> hoch –
        er wird für den KI-gestützten CV-Fit-Abgleich benötigt.
      </div>
      <div onClick={()=>!busy&&ref.current.click()} style={{width:"100%",maxWidth:300,padding:"28px 20px",
        background:B.dark,border:`2px dashed ${B.green}`,borderRadius:18,cursor:"pointer"}}>
        <div style={{fontSize:38,marginBottom:10}}>📄</div>
        <div style={{color:B.green,fontWeight:700,fontSize:15,marginBottom:6}}>Lebenslauf hochladen</div>
        <div style={{color:B.muted,fontSize:12}}>PDF oder Word · wird lokal gespeichert</div>
        {busy && <div style={{color:B.muted,marginTop:12,fontSize:13}}>Wird verarbeitet…</div>}
      </div>
      <input ref={ref} type="file" style={{display:"none"}} accept=".pdf,.doc,.docx" onChange={handle}/>
    </div>
  );
}

// ── Add Job ───────────────────────────────────────────────────────────────────
function AddJobView({cv, onSave, onCancel, prefill="", existingJob=null}) {
  const [step,setStep]   = useState(existingJob?"review":"input");
  const [text,setText]   = useState(prefill);
  const [busy,setBusy]   = useState(false);
  const [err,setErr]     = useState(null);
  const [aiNote,setAiNote] = useState("");
  const [F,setF]         = useState(existingJob ? {...existingJob} : {firma:"",rolle:"",standort:"",gehalt:"",fit:"",offerChance:"",status:"Offen",notizen:"",prioritaet:"2",datum:""});
  const upd = (k,v) => setF(p=>({...p,[k]:v}));

  async function analyze() {
    setBusy(true); setErr(null);
    try {
      const r = await analyzeJob(cv.data, cv.type, text);
      setAiNote(r.begruendung||"");
      setF({firma:r.firma||"",rolle:r.rolle||"",standort:r.standort||"",gehalt:r.gehalt||"",
        fit:r.fit?.toString()||"",offerChance:r.offerChance?.toString()||"",status:"Offen",notizen:"",prioritaet:"2",datum:""});
      setStep("review");
    } catch(e) { setErr("Fehler: "+e.message); }
    setBusy(false);
  }

  const inputStyle = {width:"100%",background:B.dark,border:`1px solid ${B.border}`,borderRadius:9,
    padding:"10px 12px",color:B.text,fontSize:14};

  if (step==="input") return (
    <div style={{paddingBottom:40}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Job analysieren</div>
      <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Stellentext einfügen</div>
      <textarea style={{...inputStyle,minHeight:140,resize:"vertical"}}
        placeholder={"Stellentext hier einfügen…\n\n(Text von der Jobseite kopieren und einfügen)"}
        value={text} onChange={e=>setText(e.target.value)}/>

      {err && <div style={{background:"#1f0707",border:"1px solid #dc2626",borderRadius:9,padding:"10px 13px",
        color:"#f87171",fontSize:13,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        <button onClick={analyze} disabled={busy||!text.trim()} style={{flex:1,padding:13,background:B.greenDark,
          border:"none",borderRadius:11,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:busy||!text.trim()?0.5:1}}>
          {busy?<><Spin/>Analysiere…</>:"KI-Analyse starten"}
        </button>
        <button onClick={onCancel} style={{flex:1,padding:13,background:"none",border:`1px solid ${B.border}`,
          borderRadius:11,color:B.muted,fontSize:14,cursor:"pointer"}}>Abbrechen</button>
      </div>
    </div>
  );

  return (
    <div style={{paddingBottom:40}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Ergebnis prüfen</div>
      {aiNote && (
        <div style={{background:B.greenSubtle,border:`1px solid ${B.greenDark}`,borderRadius:13,padding:"14px 16px",marginBottom:20}}>
          <div style={{color:B.green,fontWeight:700,fontSize:11,letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>🤖 KI-Einschätzung</div>
          <div style={{color:B.textSub,fontSize:13,lineHeight:1.65,marginBottom:12}}>{aiNote}</div>
          <div style={{display:"flex",gap:24}}>
            <div style={{textAlign:"center"}}><div style={{color:B.green,fontSize:26,fontWeight:800,fontFamily:"monospace"}}>{F.fit}%</div><div style={{color:B.muted,fontSize:10}}>CV-Fit</div></div>
            <div style={{textAlign:"center"}}><div style={{color:"#fbbf24",fontSize:26,fontWeight:800,fontFamily:"monospace"}}>{F.offerChance}%</div><div style={{color:B.muted,fontSize:10}}>Offer-Chance</div></div>
          </div>
        </div>
      )}
      {[["Firma","firma"],["Rolle","rolle"],["Standort","standort"],["Gehalt","gehalt"]].map(([l,k])=>(
        <div key={k} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>{l}</div>
          <input style={inputStyle} value={F[k]} onChange={e=>upd(k,e.target.value)} type="text"/>
        </div>
      ))}
      {/* CV-Fit and Offer-Chance: read-only KI values */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:B.dark,border:`1px solid ${B.border}`,borderRadius:9,padding:"10px 12px"}}>
          <div style={{fontSize:11,color:B.slate,marginBottom:4,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>CV-Fit</div>
          <div style={{color:B.green,fontSize:20,fontWeight:800,fontFamily:"monospace"}}>{F.fit?`${F.fit}%`:"–"}</div>
          <div style={{fontSize:10,color:B.muted,marginTop:2}}>KI-Einschätzung</div>
        </div>
        <div style={{background:B.dark,border:`1px solid ${B.border}`,borderRadius:9,padding:"10px 12px"}}>
          <div style={{fontSize:11,color:B.slate,marginBottom:4,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Offer-Chance</div>
          <div style={{color:"#fbbf24",fontSize:20,fontWeight:800,fontFamily:"monospace"}}>{F.offerChance?`${F.offerChance}%`:"–"}</div>
          <div style={{fontSize:10,color:B.muted,marginTop:2}}>KI-Einschätzung</div>
        </div>
      </div>
      {/* Bewerbungsdatum */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Bewerbungsdatum (optional)</div>
        <input style={inputStyle} type="date" value={F.datum||""} onChange={e=>upd("datum",e.target.value)}/>
      </div>
      <div style={{fontSize:11,color:B.slate,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Priorität</div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {PRIORITAET_OPTIONS.map(p=>(
          <button key={p.value} onClick={()=>upd("prioritaet",p.value)}
            style={{flex:1,padding:"10px 8px",borderRadius:10,cursor:"pointer",textAlign:"center",
              border:`1px solid ${F.prioritaet===p.value?p.color:B.border}`,
              background:F.prioritaet===p.value?B.dark:"none",
              color:F.prioritaet===p.value?p.color:B.muted,fontSize:13,fontWeight:700}}>
            <div style={{fontSize:16,marginBottom:2}}>{p.stars}</div>
            <div>{p.label}</div>
          </button>
        ))}
      </div>
      <div style={{fontSize:11,color:B.slate,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Status</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {STATUSES.map(st=>{const m=SM[st];return(
          <button key={st} onClick={()=>upd("status",st)} style={{padding:"4px 11px",borderRadius:20,
            border:`1px solid ${F.status===st?m.accent:B.border}`,background:F.status===st?m.bg:"none",
            color:F.status===st?m.dot:B.muted,fontSize:12,cursor:"pointer"}}>{st}</button>
        );})}
      </div>
      <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Notizen</div>

          border:"none",borderRadius:11,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>Speichern</button>

// ── Dashboard ─────────────────────────────────────────────────────────────────
const SORT_OPTIONS = [
  { key:"prioritaet", label:"Priorität", icon:"⭐" },
  { key:"datum",      label:"Datum",     icon:"📅" },
  { key:"fit",        label:"CV-Fit",    icon:"🎯" },
  { key:"offerChance",label:"Chance",    icon:"📊" },
  { key:"gehalt",     label:"Gehalt",    icon:"💶" },
  { key:"firma",      label:"Firma A–Z", icon:"🔤" },
];

const PRIORITAET_OPTIONS = [
  { value:"3", label:"Hoch",   color:"#f59e0b", stars:"★★★" },
  { value:"2", label:"Mittel", color:"#64748b", stars:"★★☆" },
  { value:"1", label:"Niedrig",color:"#374151", stars:"★☆☆" },
];

function parseGehalt(str) {
  if (!str) return 0;
  const nums = str.replace(/[^0-9]/g, ' ').trim().split(/\s+/).map(Number).filter(Boolean);
  return nums.length ? nums.reduce((a,b)=>a+b,0)/nums.length : 0;
}

function DashboardView({jobs,filterStatus,setFilterStatus,onDetail}) {
  const [sortKey, setSortKey]   = useState("datum");
  const [sortDir, setSortDir]   = useState("desc");

  function toggleDir() { setSortDir(d => d==="desc"?"asc":"desc"); }

  let filtered = filterStatus==="Alle" ? [...jobs] : jobs.filter(j=>j.status===filterStatus);

  filtered.sort((a,b) => {
    let va, vb;
    if (sortKey==="firma")        { va=a.firma||""; vb=b.firma||""; return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va); }
    else if (sortKey==="gehalt")  { va=parseGehalt(a.gehalt); vb=parseGehalt(b.gehalt); }
    else if (sortKey==="datum")   { va=a.datum||""; vb=b.datum||""; return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va); }
    else if (sortKey==="prioritaet") { va=Number(a.prioritaet)||0; vb=Number(b.prioritaet)||0; }
    else                          { va=Number(a[sortKey])||0; vb=Number(b[sortKey])||0; }
    return sortDir==="asc" ? va-vb : vb-va;
  });

  const sortLabel = SORT_OPTIONS.find(o=>o.key===sortKey)?.label || "Datum";
  const arrow = sortDir==="desc" ? "↓" : "↑";

  const selectStyle = {
    background: B.dark, border: `1px solid ${B.border}`, borderRadius: 20,
    color: B.text, fontSize: 12, padding: "6px 10px", cursor: "pointer",
    appearance: "none", WebkitAppearance: "none", outline: "none",
  };

  return (
    <div>
      {/* Toolbar: filter + sort in one line */}
      <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
        {/* Status dropdown */}
        <div style={{position:"relative",flex:1}}>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
            style={{...selectStyle, width:"100%", paddingRight:28}}>
            {["Alle",...STATUSES].map(st=><option key={st} value={st}>{st}</option>)}
          </select>
          <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
            color:B.muted,fontSize:10,pointerEvents:"none"}}>▾</span>
        </div>

        {/* Sort dropdown */}
        <div style={{position:"relative",flex:1}}>
          <select value={sortKey} onChange={e=>setSortKey(e.target.value)}
            style={{...selectStyle, width:"100%", paddingRight:28}}>
            {SORT_OPTIONS.map(o=><option key={o.key} value={o.key}>{o.icon} {o.label}</option>)}
          </select>
          <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
            color:B.muted,fontSize:10,pointerEvents:"none"}}>▾</span>
        </div>

        {/* Direction toggle */}
        <button onClick={toggleDir} style={{background:B.dark,border:`1px solid ${B.border}`,
          borderRadius:20,color:B.green,fontSize:14,padding:"6px 12px",cursor:"pointer",
          fontWeight:700,flexShrink:0}}>
          {arrow}
        </button>
      </div>

      {filtered.length===0 && <div style={{color:B.border,textAlign:"center",padding:"40px 16px",fontSize:14}}>Noch keine Jobs. Tippe ＋ um loszulegen.</div>}
      {filtered.map((j,i)=><JobCard key={j.id} job={j} rank={i+1} onTap={()=>onDetail(j)}/>)}
    </div>
  );
}

function fmtGehalt(str) {
  if (!str) return null;
  const nums = str.replace(/[^0-9]/g,' ').trim().split(/\s+/).map(Number).filter(Boolean);
  if (!nums.length) return str;
  if (nums.length===1) return `${Math.round(nums[0]/1000)}k €`;
  return `${Math.round(Math.min(...nums)/1000)}–${Math.round(Math.max(...nums)/1000)}k €`;
}

function JobCard({job,onTap}) {
  const m=SM[job.status]||SM.Offen;
  const prio = PRIORITAET_OPTIONS.find(p=>p.value===job.prioritaet);
  const gehaltFmt = fmtGehalt(job.gehalt);
  return (
    <div onClick={onTap} style={{background:B.dark,border:`1px solid ${B.border}`,borderLeft:`3px solid ${m.accent}`,
      borderRadius:13,padding:"13px 14px",marginBottom:10,cursor:"pointer",animation:"fadeUp .2s ease"}}>

      {/* Top row: firma + rolle left, stars right */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div style={{flex:1,minWidth:0,paddingRight:8}}>
          <div style={{fontSize:15,fontWeight:700,color:B.text}}>{job.firma}</div>
          <div style={{fontSize:13,color:B.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{job.rolle}</div>
        </div>
        {prio && <span style={{fontSize:13,color:prio.color,flexShrink:0,marginTop:2}}>{prio.stars}</span>}
      </div>

      {/* Meta chips */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
        {job.standort    && <span style={{background:B.darker,border:`0.5px solid ${B.border}`,borderRadius:6,padding:"3px 8px",fontSize:12,color:B.textSub}}>📍 {job.standort}</span>}
        {gehaltFmt       && <span style={{background:B.darker,border:`0.5px solid ${B.border}`,borderRadius:6,padding:"3px 8px",fontSize:12,color:B.textSub}}>💶 {gehaltFmt}</span>}
        {job.fit         && <span style={{background:B.darker,border:`0.5px solid ${B.border}`,borderRadius:6,padding:"3px 8px",fontSize:12,color:B.textSub}}>🎯 {job.fit}%</span>}
        {job.offerChance && <span style={{background:B.darker,border:`0.5px solid ${B.border}`,borderRadius:6,padding:"3px 8px",fontSize:12,color:B.textSub}}>📊 {job.offerChance}%</span>}
      </div>

      {/* Bottom: status */}
      <div style={{borderTop:`0.5px solid ${B.border}`,paddingTop:8}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,color:m.dot}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:m.dot,display:"inline-block"}}/>
          {job.status}
        </span>
      </div>
    </div>
  );
}

// ── Kanban ────────────────────────────────────────────────────────────────────
function KanbanView({jobs,onDetail}) {
  const [idx, setIdx] = useState(0);
  const touchStart = useRef(null);

  function onTouchStart(e) { touchStart.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStart.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if (dx < -40 && idx < STATUSES.length-1) setIdx(i=>i+1);
    if (dx >  40 && idx > 0)                 setIdx(i=>i-1);
    touchStart.current = null;
  }

  const st = STATUSES[idx];
  const m  = SM[st];
  const col = jobs.filter(j=>j.status===st);
  const h = "calc(100vh - 175px)";

  return (
    <div style={{userSelect:"none"}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      {/* Header bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0}
          style={{background:"none",border:"none",color:idx===0?B.border:B.green,
            fontSize:22,cursor:idx===0?"default":"pointer",padding:"0 4px",lineHeight:1}}>‹</button>

        <div style={{textAlign:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:m.dot,display:"inline-block"}}/>
            <span style={{color:B.text,fontSize:17,fontWeight:800}}>{st}</span>
            <span style={{background:m.bg,color:m.dot,border:`1px solid ${m.accent}`,
              borderRadius:10,fontSize:12,fontWeight:700,padding:"2px 9px"}}>{col.length}</span>
          </div>
        </div>

        <button onClick={()=>setIdx(i=>Math.min(STATUSES.length-1,i+1))} disabled={idx===STATUSES.length-1}
          style={{background:"none",border:"none",color:idx===STATUSES.length-1?B.border:B.green,
            fontSize:22,cursor:idx===STATUSES.length-1?"default":"pointer",padding:"0 4px",lineHeight:1}}>›</button>
      </div>

      {/* Cards */}
      <div style={{height:h,overflowY:"auto",paddingBottom:8}}>
        {col.length===0 && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"40%",
            color:B.border,fontSize:14,flexDirection:"column",gap:8}}>
            <span style={{fontSize:32}}>○</span>
            Keine Jobs in diesem Status
          </div>
        )}
        {col.map(j=>(
          <div key={j.id} onClick={()=>onDetail(j)} style={{background:B.dark,borderRadius:12,
            padding:"12px 14px",marginBottom:10,cursor:"pointer",
            borderLeft:`3px solid ${m.accent}`,animation:"fadeUp .2s ease"}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{j.firma}</div>
            <div style={{fontSize:13,color:B.muted,marginBottom:8}}>{j.rolle}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"3px 12px",fontSize:12,color:B.slate}}>
              {j.standort    && <span>📍 {j.standort}</span>}
              {j.gehalt      && <span>💶 {j.gehalt}</span>}
              {j.fit         && <span>🎯 Fit {j.fit}%</span>}
              {j.offerChance && <span>📊 {j.offerChance}%</span>}
            </div>
          </div>
        ))}
      </div>

      {/* Dot indicators */}
      <div style={{display:"flex",justifyContent:"center",gap:6,paddingTop:12}}>
        {STATUSES.map((s,i)=>{
          const active = i===idx;
          const mc = SM[s];
          return (
            <button key={s} onClick={()=>setIdx(i)} style={{
              width: active?20:7, height:7, borderRadius:4,
              background: active?mc.dot:B.border,
              border:"none", cursor:"pointer", padding:0,
              transition:"all .25s ease"
            }}/>
          );
        })}
      </div>
    </div>
  );
}

function SucheView({onAnalyze}) {
  const [query, setQuery] = useState("");
  const [ort,   setOrt]   = useState("");

  const inputStyle = {
    width:"100%", background:B.dark, border:`1px solid ${B.border}`,
    borderRadius:9, padding:"10px 12px", color:B.text, fontSize:14
  };

  function openAll() {
    PORTALE.forEach(p => window.open(p.url(query||"Jobs", ort||"Deutschland"), "_blank"));
  }

  return (
    <div style={{paddingBottom:40}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Job-Suche</div>
      <div style={{fontSize:13,color:B.muted,marginBottom:20}}>Suchbegriff eingeben – dann direkt auf dem Portal deiner Wahl öffnen.</div>

      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Jobtitel / Stichwort</div>
        <input style={inputStyle} placeholder="z.B. Marketing Manager" value={query} onChange={e=>setQuery(e.target.value)}/>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Ort</div>
        <input style={inputStyle} placeholder="z.B. Frankfurt, Hamburg, Remote" value={ort} onChange={e=>setOrt(e.target.value)}/>
      </div>

      <div style={{fontSize:11,color:B.slate,marginBottom:10,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>
        Portal öffnen {(!query.trim()||!ort.trim()) && <span style={{color:B.muted,fontWeight:400,textTransform:"none",fontSize:11}}>– bitte erst Jobtitel und Ort eingeben</span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {PORTALE.map(p=>(
          <button key={p.name}
            disabled={!query.trim()||!ort.trim()}
            onClick={()=>window.open(p.url(query, ort), "_blank")}
            style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
              background:B.dark,border:`1px solid ${!query.trim()||!ort.trim()?B.border:B.border}`,borderRadius:12,
              cursor:!query.trim()||!ort.trim()?"default":"pointer",textAlign:"left",
              borderLeft:`3px solid ${!query.trim()||!ort.trim()?"#1f2937":p.color}`,
              opacity:!query.trim()||!ort.trim()?0.4:1,transition:"opacity .2s"}}>
            <span style={{flexShrink:0,display:"flex",alignItems:"center"}}>{p.logo}</span>
            <div style={{color:B.text,fontSize:13,fontWeight:700,flex:1,display:"flex",alignItems:"center"}}>{p.name}</div>
            <span style={{color:B.muted,fontSize:14,display:"flex",alignItems:"center"}}>↗</span>
          </button>
        ))}
      </div>



      <div style={{borderTop:`1px solid ${B.border}`,paddingTop:20}}>
        <div style={{fontSize:13,color:B.muted,lineHeight:1.7,marginBottom:14}}>
          <strong style={{color:B.text}}>Job gefunden?</strong> Kopiere den Stellentext und füge ihn in die KI-Analyse ein.
        </div>
        <button onClick={()=>onAnalyze("")} style={{width:"100%",padding:13,
          background:B.dark,border:`1px solid ${B.border}`,borderRadius:11,
          color:B.green,fontSize:14,fontWeight:700,cursor:"pointer"}}>
          Jetzt Job analysieren →
        </button>
      </div>
    </div>
  );
}

function StatsView({jobs}) {
  const total    = jobs.length;
  const beworben = jobs.filter(j=>["Beworben","Interview","Angebot","Absage"].includes(j.status)).length;
  const interview= jobs.filter(j=>["Interview","Angebot"].includes(j.status)).length;
  const angebot  = jobs.filter(j=>j.status==="Angebot").length;
  const absage   = jobs.filter(j=>j.status==="Absage").length;

  const interviewRate = beworben>0 ? Math.round(interview/beworben*100) : null;
  const angebotRate   = interview>0? Math.round(angebot/interview*100)  : null;
  const absageRate    = beworben>0 ? Math.round(absage/beworben*100)    : null;

  const tiles = [
    { label:"Gesamt",              value: total,                                  accent: B.green,   sub: "Stellen getrackt" },
    { label:"Bewerbung → Interview",value: interviewRate!==null?`${interviewRate}%`:"–", accent:"#60a5fa", sub: `${interview} von ${beworben} Bewerbungen` },
    { label:"Interview → Angebot", value: angebotRate!==null?`${angebotRate}%`:"–",   accent:"#fbbf24", sub: `${angebot} von ${interview} Interviews` },
    { label:"Absage-Rate",         value: absageRate!==null?`${absageRate}%`:"–",     accent:"#f87171", sub: `${absage} Absagen` },
  ];

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
        {tiles.map(({label,value,accent,sub})=>(
          <div key={label} style={{background:B.dark,borderRadius:12,padding:"14px 16px",borderTop:`2px solid ${accent}`}}>
            <div style={{color:accent,fontSize:26,fontWeight:800,fontFamily:"monospace"}}>{value}</div>
            <div style={{color:B.text,fontSize:12,fontWeight:600,marginTop:4}}>{label}</div>
            <div style={{color:B.muted,fontSize:11,marginTop:2}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:B.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Status-Übersicht</div>
      {STATUSES.map(st=>{
        const m=SM[st],cnt=jobs.filter(j=>j.status===st).length,pct=total?Math.round(cnt/total*100):0;
        return (
          <div key={st} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{color:m.dot,fontSize:13}}>{st}</span>
              <span style={{color:B.muted,fontSize:13}}>{cnt}</span>
            </div>
            <div style={{background:B.border,borderRadius:4,height:5}}>

function DocsView({docs,setDocs,cv,setCv,showToast}) {
  const docRef=useRef(), cvRef=useRef();

  function upload(e) {
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{ setDocs(d=>[...d,{id:uid(),name:file.name,type:file.type,size:file.size,data:ev.target.result,datum:today()}]); showToast(`${file.name} ✓`); };
      r.readAsDataURL(file);
    });
    e.target.value="";
  }

  function replaceCv(e) {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ const d=ev.target.result; setCv({name:file.name,type:file.type,data:d.split(",")[1],dataUrl:d,datum:today()}); showToast("CV aktualisiert ✓"); };
    r.readAsDataURL(file);
    e.target.value="";
  }

  function del(id){ setDocs(d=>d.filter(x=>x.id!==id)); showToast("Gelöscht"); }
  function icon(t){ return t.includes("pdf")?"📄":t.includes("image")?"🖼️":t.includes("word")||t.includes("document")?"📝":"📎"; }
  function fmtSz(b){ return b<1024?`${b} B`:b<1048576?`${(b/1024).toFixed(1)} KB`:`${(b/1048576).toFixed(1)} MB`; }

  const rowStyle={display:"flex",alignItems:"center",gap:12,background:B.dark,borderRadius:11,padding:"10px 13px",marginBottom:8};
  const secTitle={fontSize:11,color:B.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:1};

  return (
    <div>
      <div style={secTitle}>Mein Lebenslauf</div>
      <div style={{...rowStyle,border:`1px solid ${B.greenMid}`,marginBottom:18}}>
        <span style={{fontSize:22}}>📄</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cv.name}</div>
          <div style={{color:B.muted,fontSize:11}}>Aktiver CV · {cv.datum}</div>
        </div>
        <button onClick={()=>cvRef.current.click()} style={{background:"none",border:"none",color:B.green,fontSize:12,cursor:"pointer"}}>Ersetzen</button>
      </div>
      <input ref={cvRef} type="file" style={{display:"none"}} accept=".pdf,.doc,.docx" onChange={replaceCv}/>

      <div style={secTitle}>Weitere Dokumente</div>
      <button onClick={()=>docRef.current.click()} style={{width:"100%",padding:12,background:B.greenSubtle,
        border:`1px dashed ${B.greenMid}`,borderRadius:11,color:B.green,fontSize:14,cursor:"pointer",marginBottom:16}}>
        ↑ Dokument hochladen
      </button>
      <input ref={docRef} type="file" style={{display:"none"}} multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onChange={upload}/>

      {docs.length===0 && <div style={{color:B.border,textAlign:"center",padding:"30px 16px",fontSize:14}}>Anschreiben, Zeugnisse etc. hier ablegen.</div>}
      {docs.map(d=>(
        <div key={d.id} style={rowStyle}>
          <span style={{fontSize:22}}>{icon(d.type)}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</div>
            <div style={{color:B.muted,fontSize:11}}>{fmtSz(d.size)} · {d.datum}</div>
          </div>
          <button onClick={()=>del(d.id)} style={{background:"none",border:"none",color:"#f87171",fontSize:16,cursor:"pointer"}}>✕</button>
        </div>
      ))}
    </div>
  );
}

async function generateAnschreiben(cvBase64, cvType, job) {
  const sys = `Du bist ein professioneller Bewerbungsberater. Erstelle ein überzeugendes deutsches Anschreiben.
Format – halte dich exakt daran:
Bewerbung als [Rolle]

Sehr geehrte Damen und Herren,

[3 Absätze: Einleitung (Interesse + Stelle), Hauptteil (konkrete Qualifikationen aus dem CV passend zu den Anforderungen der Stelle), Schluss (Motivation + Gesprächswunsch)]

Mit freundlichen Grüßen

Kein Absender, keine Adresse, kein Datum, kein Empfänger, kein Name am Ende – nur der obige Block.
Ton: professionell, authentisch, nicht generisch. Beziehe dich konkret auf Anforderungen der Stelle und passende CV-Inhalte.
Antworte NUR mit dem fertigen Text, ohne Kommentare oder Erklärungen.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      system: sys,
      messages: [{
        role: "user",
        content: [
          { type: "document", source: { type: "base64", media_type: cvType || "application/pdf", data: cvBase64 } },
          { type: "text", text: `Stelle: ${job.rolle} bei ${job.firma} in ${job.standort||"Deutschland"}

Bitte erstelle ein passendes Anschreiben auf Basis meines Lebenslaufs.` }
        ]
      }]
    })
  });
  const data = await res.json();
  return data.content?.map(i => i.text || "").join("") || "";
}

function AnschreibenView({ job, cv, onBack, onSave }) {
  const [text, setText]   = useState(job.anschreiben || "");
  const [busy, setBusy]   = useState(false);
  const [err,  setErr]    = useState(null);
  const [done, setDone]       = useState(!!job.anschreiben);
  const [shortening, setShortening] = useState(false);

  useEffect(() => { if (!job.anschreiben) generate(); }, []);

  async function shorten() {
    setShortening(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": ANTHROPIC_API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 400,
          messages: [{
            role: "user",
            content: `Kürze dieses Anschreiben auf ein kompaktes Motivationsschreiben für die direkte Eingabe in ein Online-Bewerbungsformular. Ziel: 20-30% der ursprünglichen Länge. Kein Betreff, keine Anrede, keine Grußformel, kein Name – nur 2-3 prägnante Sätze die Motivation und Qualifikation auf den Punkt bringen. Antworte NUR mit dem gekürzten Text.

${text}`
          }]
        })
      });
      const data = await res.json();
      const short = data.content?.map(i=>i.text||"").join("") || "";
      setText(short);
    } catch(e) { console.error(e); }
    setShortening(false);
  }

  async function generate() {
    setBusy(true); setErr(null);
    try {
      const result = await generateAnschreiben(cv.data, cv.type, job);
      setText(result);
      setDone(true);
      onSave(job.id, result);
    } catch(e) {
      setErr("Fehler beim Generieren: " + e.message);
    }
    setBusy(false);
  }

  function printToPdf() {
    // Inject text into print area and trigger print
    const area = document.getElementById('print-area');
    area.innerHTML = `
      <div style="font-family: 'Georgia', serif; font-size: 12pt; line-height: 1.7; max-width: 650px; margin: 0 auto; padding: 40px; color: #000;">
        <pre style="white-space: pre-wrap; font-family: inherit; font-size: inherit;">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
      </div>`;
    window.print();
  }

  return (
    <div style={{paddingBottom:40}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:B.green,fontSize:14,cursor:"pointer",padding:0}}>← Zurück</button>
        <button onClick={()=>onEdit(job)} style={{background:"none",border:`1px solid ${B.border}`,borderRadius:8,color:B.muted,fontSize:12,cursor:"pointer",padding:"5px 12px"}}>✏️ Bearbeiten</button>
      </div>
      <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Anschreiben</div>
      <div style={{fontSize:13,color:B.muted,marginBottom:20}}>
        {job.rolle} · {job.firma}
      </div>

      {busy && (
        <div style={{display:"flex",alignItems:"center",gap:10,color:B.muted,
          padding:"40px 0",justifyContent:"center",flexDirection:"column"}}>
          <Spin/>
          <span style={{fontSize:14}}>KI erstellt dein Anschreiben…</span>
        </div>
      )}

      {err && (
        <div style={{background:"#1f0707",border:"1px solid #dc2626",borderRadius:9,
          padding:"10px 13px",color:"#f87171",fontSize:13,marginBottom:16}}>{err}</div>
      )}

      {done && (
        <>
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            onBlur={e => onSave(job.id, e.target.value)}
            style={{width:"100%",background:B.dark,border:`1px solid ${B.border}`,
              borderRadius:9,padding:"14px",color:B.text,fontSize:13,
              lineHeight:1.7,resize:"vertical",minHeight:420,
              fontFamily:"'Georgia', serif"}}
          />
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <button onClick={printToPdf} style={{flex:1,padding:13,
              background:B.greenDark,border:"none",borderRadius:11,
              color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              📄 Als PDF speichern
            </button>
            <button onClick={shorten} disabled={shortening} style={{flex:"0 0 auto",padding:"13px 16px",
              background:"none",border:`1px solid ${B.border}`,borderRadius:11,
              color:shortening?B.muted:B.green,fontSize:14,cursor:shortening?"default":"pointer",
              whiteSpace:"nowrap"}}>
              {shortening?<><Spin/>…</>:"✂️ Kürzen"}
            </button>
          </div>
          <div style={{fontSize:11,color:B.muted,marginTop:10,lineHeight:1.6}}>
            Tipp: Text oben direkt bearbeiten bevor du als PDF speicherst. „Kürzen" erstellt ein kompaktes Motivationsschreiben für Online-Formulare.
          </div>
        </>
      )}
    </div>
  );
}

function InterviewView({ job, cv, onBack, onSavePrep }) {
  const [sections, setSections] = useState(job.interviewPrep || null);
  const [busy, setBusy]         = useState(false);
  const [err,  setErr]          = useState(null);
  const [activeTab, setActiveTab] = useState(0);

  const TABS = ["Fragen","Stärken","Lücken","Gehalt"];
  const KEYS = ["TYPISCHE INTERVIEWFRAGEN","DEINE STÄRKEN FÜR DIESE STELLE","MÖGLICHE LÜCKEN & ANTWORTEN","GEHALTSVERHANDLUNG"];
  const TAB_COLORS = [B.green, "#60a5fa", "#f87171", "#fbbf24"];

  useEffect(() => { if (!job.interviewPrep) generate(); }, []);

  function parseIntoSections(raw) {
    const result = {};
    KEYS.forEach((key, i) => {
      const next = KEYS[i+1];
      const start = raw.indexOf(key);
      if (start === -1) { result[key] = ""; return; }
      const contentStart = start + key.length;
      const end = next ? raw.indexOf(next) : raw.length;
      result[key] = raw.slice(contentStart, end !== -1 ? end : raw.length).trim();
    });
    return result;
  }

  async function generate() {
    setBusy(true); setErr(null);
    try {
      const raw = await generateInterview(cv.data, cv.type, job);
      const parsed = parseIntoSections(raw);
      setSections(parsed);
      onSavePrep(job.id, parsed);
    } catch(e) {
      setErr("Fehler beim Generieren: " + e.message);
    }
    setBusy(false);
  }

  return (
    <div style={{paddingBottom:40}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:B.green,
        fontSize:14,cursor:"pointer",padding:"0 0 16px"}}>← Zurück</button>
      <div style={{fontSize:20,fontWeight:800,marginBottom:2}}>Interviewvorbereitung</div>
      <div style={{fontSize:13,color:B.muted,marginBottom:20}}>{job.rolle} · {job.firma}</div>

      {busy && (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",
          justifyContent:"center",padding:"50px 0",gap:12,color:B.muted}}>
          <Spin/>
          <span style={{fontSize:14}}>KI analysiert Stelle und CV…</span>
        </div>
      )}

      {err && (
        <div style={{background:"#1f0707",border:"1px solid #dc2626",borderRadius:9,
          padding:"10px 13px",color:"#f87171",fontSize:13,marginBottom:16}}>{err}</div>
      )}

      {sections && (
        <>
          {/* Tab bar */}
          <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto"}}>
            {TABS.map((tab,i) => (
              <button key={tab} onClick={()=>setActiveTab(i)} style={{
                padding:"6px 14px",borderRadius:20,border:`1px solid ${activeTab===i?TAB_COLORS[i]:B.border}`,
                background:activeTab===i?B.dark:"none",color:activeTab===i?TAB_COLORS[i]:B.muted,
                fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
                {tab}
              </button>
            ))}
          </div>

          {/* Active section */}
          <div style={{background:B.dark,border:`1px solid ${B.border}`,borderRadius:12,padding:"14px 16px"}}>
            <div style={{fontSize:11,color:TAB_COLORS[activeTab],fontWeight:700,
              textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>
              {KEYS[activeTab]}
            </div>
            <div style={{fontSize:13,color:B.textSub,lineHeight:1.8,whiteSpace:"pre-wrap"}}>
              {sections[KEYS[activeTab]].replace(/\*\*/g,"").replace(/#{1,3} /g,"").trim()}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

            <span>{icon}</span>
            <div>
              <div style={{color:B.slate,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
              <div style={{fontSize:13,marginTop:1}}>{v}</div>
            </div>
          </div>
        ))}
      </div>

      {job.notizen && (
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Notizen</div>
          <div style={{color:B.textSub,fontSize:14,lineHeight:1.65}}>{job.notizen}</div>
        </div>
      )}

      <div style={{fontSize:11,color:B.slate,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Status ändern</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:24}}>
        {STATUSES.map(st=>{const m2=SM[st];return(
          <button key={st} onClick={()=>updateStatus(job.id,st)} style={{padding:"4px 11px",borderRadius:20,
            border:`1px solid ${job.status===st?m2.accent:B.border}`,background:job.status===st?m2.bg:"none",
            color:job.status===st?m2.dot:B.muted,fontSize:12,cursor:"pointer"}}>{st}</button>
        );})}
      </div>

      <div style={{display:"flex",gap:8,marginTop:8}}>
        <button onClick={()=>onAnschreiben(job)} style={{flex:1,padding:12,
          background:B.greenDark,border:"none",borderRadius:11,
          color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          Anschreiben
        </button>
        <button onClick={()=>onInterview(job)} style={{flex:1,padding:12,
          background:B.greenDark,border:"none",borderRadius:11,
          color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>
          Interview-Prep
        </button>
      </div>
    </div>
  );
}

function Spin() {
  return <span style={{display:"inline-block",width:12,height:12,border:"2px solid rgba(255,255,255,.3)",
    borderTopColor:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite",marginRight:6}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
