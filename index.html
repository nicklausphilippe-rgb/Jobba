<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Storage (localStorage) ───────────────────────────────────────────────────
const JOBS_KEY = "jobba-jobs";
const DOCS_KEY = "jobba-docs";
const CV_KEY   = "jobba-cv";

function loadData(key)       { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } }
function saveData(key, val)  { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ── Brand ────────────────────────────────────────────────────────────────────
const B = {
  green:"#66eaa3", greenDark:"#1a9e60", greenMid:"#3dd68c",
  greenBg:"#0a2318", greenSubtle:"#0d2a1e",
  dark:"#1a1f2e", darker:"#0d1117", darkest:"#080c12",
  charcoal:"#555560", slate:"#4b5563", muted:"#6b7280",
  text:"#f0fdf4", textSub:"#9ca3af", border:"#1f2937",
};

const STATUSES = ["Offen","Beworben","Interview","Angebot","Absage","Zurückgezogen"];
const SM = {
  Offen:         {bg:"#1a1f2e",accent:"#4b5563",dot:"#9ca3af"},
  Beworben:      {bg:"#0c1f3a",accent:"#2563eb",dot:"#60a5fa"},
  Interview:     {bg:"#0a2318",accent:"#1a9e60",dot:"#66eaa3"},
  Angebot:       {bg:"#1c1003",accent:"#d97706",dot:"#fbbf24"},
  Absage:        {bg:"#1f0707",accent:"#dc2626",dot:"#f87171"},
  Zurückgezogen: {bg:"#130f1f",accent:"#7c3aed",dot:"#c084fc"},
};

function uid()   { return Math.random().toString(36).slice(2,10); }
function today() { return new Date().toISOString().slice(0,10); }

// ── Claude API ────────────────────────────────────────────────────────────────
async function analyzeJob(cvBase64, cvType, jobText) {
  const sys = `Du bist ein Karriere-Assistent. Analysiere eine Stellenausschreibung anhand eines Lebenslaufs.
Antworte NUR mit validem JSON, ohne Markdown oder Backticks.
Schema: {"firma":"","rolle":"","standort":"","gehalt":"geschaetztes Jahresgehalt z.B. 60000-75000 EUR","fit":0,"offerChance":0,"begruendung":"2-3 Saetze"}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: sys,
      messages: [{
        role: "user",
        content: [
          { type: "document", source: { type: "base64", media_type: cvType || "application/pdf", data: cvBase64 } },
          { type: "text", text: `Stellenausschreibung:\n\n${jobText}\n\nBitte analysieren und mit dem Lebenslauf abgleichen.` }
        ]
      }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({error:{message:"Unbekannter Fehler"}}));
    throw new Error(err.error?.message || "API Fehler");
  }
  const data = await res.json();
  const raw = data.content?.map(i=>i.text||"").join("") || "";
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [view, setView]           = useState("dashboard");
  const [jobs, setJobs]           = useState([]);
  const [docs, setDocs]           = useState([]);
  const [cv, setCv]               = useState(null);
  const [detailJob, setDetailJob] = useState(null);
  const [loaded, setLoaded]       = useState(false);
  const [filterStatus, setFilterStatus] = useState("Alle");
  const [toast, setToast]         = useState(null);

  useEffect(() => {
    const j = loadData(JOBS_KEY);
    const d = loadData(DOCS_KEY);
    const c = loadData(CV_KEY);
    if (j) setJobs(j);
    if (d) setDocs(d);
    if (c) setCv(c);
    setLoaded(true);
  }, []);

  useEffect(() => { if (loaded) saveData(JOBS_KEY, jobs); }, [jobs, loaded]);
  useEffect(() => { if (loaded) saveData(DOCS_KEY, docs); }, [docs, loaded]);
  useEffect(() => { if (loaded && cv) saveData(CV_KEY, cv); }, [cv, loaded]);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null), 2800); }

  function saveJob(job) {
    if (job.id) setJobs(j=>j.map(x=>x.id===job.id?job:x));
    else        setJobs(j=>[...j,{...job,id:uid(),datum:today()}]);
    showToast("Gespeichert ✓");
    setView("dashboard");
  }

  function deleteJob(id) {
    setJobs(j=>j.filter(x=>x.id!==id));
    setDetailJob(null); setView("dashboard");
    showToast("Gelöscht");
  }

  function updateStatus(id, status) { setJobs(j=>j.map(x=>x.id===id?{...x,status}:x)); }

  if (!loaded) return <Splash />;
  if (!cv) return <CvOnboarding onDone={c=>{setCv(c);showToast("Lebenslauf gespeichert ✓");}} />;

  return (
    <div style={{background:B.darkest,minHeight:"100vh",color:B.text}}>
      <header style={{padding:"14px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${B.border}`,position:"sticky",top:0,background:B.darkest,zIndex:100}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <JobbaLogo size={36}/>
          <div style={{fontSize:11,color:B.muted}}>{jobs.length} Jobs · {jobs.filter(j=>j.status==="Interview").length} Interviews</div>
        </div>
        <button onClick={()=>setView("add")} style={{width:38,height:38,borderRadius:12,background:B.greenDark,border:"none",color:"#fff",cursor:"pointer",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</button>
      </header>

      <nav style={{display:"flex",borderBottom:`1px solid ${B.border}`,position:"sticky",top:63,background:B.darkest,zIndex:99}}>
        {[{id:"dashboard",icon:"☰",l:"Liste"},{id:"kanban",icon:"⊞",l:"Board"},{id:"stats",icon:"◎",l:"Stats"},{id:"docs",icon:"◫",l:"Docs"}].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"9px 2px 8px",background:"none",border:"none",
            color:view===t.id?B.green:B.muted,fontSize:11,cursor:"pointer",display:"flex",flexDirection:"column",
            alignItems:"center",gap:2,borderBottom:view===t.id?`2px solid ${B.green}`:"2px solid transparent"}}>
            <span style={{fontSize:15}}>{t.icon}</span><span>{t.l}</span>
          </button>
        ))}
      </nav>

      <main style={{padding:16,paddingBottom:40}}>
        {view==="dashboard" && <DashboardView jobs={jobs} filterStatus={filterStatus} setFilterStatus={setFilterStatus} onDetail={j=>{setDetailJob(j);setView("detail");}}/>}
        {view==="kanban"    && <KanbanView    jobs={jobs} onDetail={j=>{setDetailJob(j);setView("detail");}} updateStatus={updateStatus}/>}
        {view==="stats"     && <StatsView     jobs={jobs}/>}
        {view==="docs"      && <DocsView      docs={docs} setDocs={setDocs} cv={cv} setCv={setCv} showToast={showToast}/>}
        {view==="add"       && <AddJobView    cv={cv} onSave={saveJob} onCancel={()=>setView("dashboard")}/>}
        {view==="detail" && detailJob && (
          <DetailView job={jobs.find(j=>j.id===detailJob.id)||detailJob}
            onDelete={deleteJob} onBack={()=>setView("dashboard")} updateStatus={updateStatus}/>
        )}
      </main>

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
        background:B.dark,border:`1px solid ${B.greenDark}`,color:B.green,padding:"10px 22px",
        borderRadius:22,fontSize:13,zIndex:9999,whiteSpace:"nowrap",animation:"toastIn .25s ease"}}>{toast}</div>}
    </div>
  );
}

function JobbaLogo({size=40}) {
  // size maps to height; aspect ratio ~1.167 (w/h of original)
  const h = size;
  const w = Math.round(size * 1.167);
  return <img src={LOGO_SMALL} height={h} width={w} alt="Jobba" style={{display:"block"}}/>;
}

function JobbaLogoLarge() {
  return <img src={LOGO_MEDIUM} height={120} alt="Jobba" style={{display:"block"}}/>;
}

function Splash() {
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:B.darkest,gap:12}}>
      <JobbaLogoLarge/><p style={{color:B.muted,fontSize:13}}>Lade…</p>
    </div>
  );
}

// ── CV Onboarding ─────────────────────────────────────────────────────────────
function CvOnboarding({onDone}) {
  const ref = useRef();
  const [busy, setBusy] = useState(false);
  function handle(e) {
    const file=e.target.files[0]; if(!file) return;
    setBusy(true);
    const r=new FileReader();
    r.onload=ev=>{
      const du=ev.target.result;
      onDone({name:file.name,type:file.type,data:du.split(",")[1],dataUrl:du,datum:today()});
      setBusy(false);
    };
    r.readAsDataURL(file);
    e.target.value="";
  }
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      minHeight:"100vh",padding:32,background:B.darkest,textAlign:"center"}}>
      <JobbaLogoLarge/>
      <div style={{marginTop:20,marginBottom:8,fontSize:24,fontWeight:800}}>Willkommen bei Jobba</div>
      <div style={{color:B.muted,fontSize:14,lineHeight:1.7,marginBottom:32,maxWidth:300}}>
        Lade zuerst deinen <strong style={{color:B.green}}>Lebenslauf</strong> hoch –
        er wird für den KI-gestützten CV-Fit-Abgleich benötigt.
      </div>
      <div onClick={()=>!busy&&ref.current.click()} style={{width:"100%",maxWidth:300,padding:"28px 20px",
        background:B.dark,border:`2px dashed ${B.green}`,borderRadius:18,cursor:"pointer"}}>
        <div style={{fontSize:38,marginBottom:10}}>📄</div>
        <div style={{color:B.green,fontWeight:700,fontSize:15,marginBottom:6}}>Lebenslauf hochladen</div>
        <div style={{color:B.muted,fontSize:12}}>PDF oder Word · wird lokal gespeichert</div>
        {busy && <div style={{color:B.muted,marginTop:12,fontSize:13}}>Wird verarbeitet…</div>}
      </div>
      <input ref={ref} type="file" style={{display:"none"}} accept=".pdf,.doc,.docx" onChange={handle}/>
    </div>
  );
}

// ── Add Job ───────────────────────────────────────────────────────────────────
function AddJobView({cv, onSave, onCancel}) {
  const [step,setStep]   = useState("input");
  const [text,setText]   = useState("");
  const [busy,setBusy]   = useState(false);
  const [err,setErr]     = useState(null);
  const [aiNote,setAiNote] = useState("");
  const [F,setF]         = useState({firma:"",rolle:"",standort:"",gehalt:"",fit:"",offerChance:"",status:"Offen",notizen:""});
  const upd = (k,v) => setF(p=>({...p,[k]:v}));

  async function analyze() {
    setBusy(true); setErr(null);
    try {
      const r = await analyzeJob(cv.data, cv.type, text);
      setAiNote(r.begruendung||"");
      setF({firma:r.firma||"",rolle:r.rolle||"",standort:r.standort||"",gehalt:r.gehalt||"",
        fit:r.fit?.toString()||"",offerChance:r.offerChance?.toString()||"",status:"Offen",notizen:""});
      setStep("review");
    } catch(e) { setErr("Fehler: "+e.message); }
    setBusy(false);
  }

  const inputStyle = {width:"100%",background:B.dark,border:`1px solid ${B.border}`,borderRadius:9,
    padding:"10px 12px",color:B.text,fontSize:14};

  if (step==="input") return (
    <div style={{paddingBottom:40}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Job analysieren</div>
      <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Stellentext einfügen</div>
      <textarea style={{...inputStyle,minHeight:140,resize:"vertical"}}
        placeholder={"Stellentext hier einfügen…\n\n(Text von der Jobseite kopieren und einfügen)"}
        value={text} onChange={e=>setText(e.target.value)}/>
      <div style={{background:B.dark,border:`1px solid ${B.border}`,borderRadius:10,padding:"10px 13px",
        fontSize:12,color:B.muted,display:"flex",gap:8,lineHeight:1.5,margin:"12px 0"}}>
        <span style={{color:B.green}}>ℹ</span>
        Links zu Jobportalen werden durch Browser-Sicherheitsrichtlinien blockiert – bitte Text direkt einfügen.
      </div>
      {err && <div style={{background:"#1f0707",border:"1px solid #dc2626",borderRadius:9,padding:"10px 13px",
        color:"#f87171",fontSize:13,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:10}}>
        <button onClick={analyze} disabled={busy||!text.trim()} style={{flex:1,padding:13,background:B.greenDark,
          border:"none",borderRadius:11,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6,opacity:busy||!text.trim()?0.5:1}}>
          {busy?<><Spin/>Analysiere…</>:"🤖 KI-Analyse starten"}
        </button>
        <button onClick={onCancel} style={{flex:1,padding:13,background:"none",border:`1px solid ${B.border}`,
          borderRadius:11,color:B.muted,fontSize:14,cursor:"pointer"}}>Abbrechen</button>
      </div>
    </div>
  );

  return (
    <div style={{paddingBottom:40}}>
      <div style={{fontSize:20,fontWeight:800,marginBottom:20}}>Ergebnis prüfen</div>
      {aiNote && (
        <div style={{background:B.greenSubtle,border:`1px solid ${B.greenDark}`,borderRadius:13,padding:"14px 16px",marginBottom:20}}>
          <div style={{color:B.green,fontWeight:700,fontSize:11,letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>🤖 KI-Einschätzung</div>
          <div style={{color:B.textSub,fontSize:13,lineHeight:1.65,marginBottom:12}}>{aiNote}</div>
          <div style={{display:"flex",gap:24}}>
            <div style={{textAlign:"center"}}><div style={{color:B.green,fontSize:26,fontWeight:800,fontFamily:"monospace"}}>{F.fit}%</div><div style={{color:B.muted,fontSize:10}}>CV-Fit</div></div>
            <div style={{textAlign:"center"}}><div style={{color:"#fbbf24",fontSize:26,fontWeight:800,fontFamily:"monospace"}}>{F.offerChance}%</div><div style={{color:B.muted,fontSize:10}}>Offer-Chance</div></div>
          </div>
        </div>
      )}
      {[["Firma","firma"],["Rolle","rolle"],["Standort","standort"],["Gehalt","gehalt"],["CV-Fit %","fit"],["Chance %","offerChance"]].map(([l,k])=>(
        <div key={k} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>{l}</div>
          <input style={inputStyle} value={F[k]} onChange={e=>upd(k,e.target.value)} type={k==="fit"||k==="offerChance"?"number":"text"}/>
        </div>
      ))}
      <div style={{fontSize:11,color:B.slate,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Status</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {STATUSES.map(st=>{const m=SM[st];return(
          <button key={st} onClick={()=>upd("status",st)} style={{padding:"4px 11px",borderRadius:20,
            border:`1px solid ${F.status===st?m.accent:B.border}`,background:F.status===st?m.bg:"none",
            color:F.status===st?m.dot:B.muted,fontSize:12,cursor:"pointer"}}>{st}</button>
        );})}
      </div>
      <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Notizen</div>
      <textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={F.notizen}
        onChange={e=>upd("notizen",e.target.value)} placeholder="Ansprechpartner, nächste Schritte…"/>
      <div style={{display:"flex",gap:10,marginTop:20}}>
        <button onClick={()=>{if(F.firma&&F.rolle)onSave(F);}} style={{flex:1,padding:13,background:B.greenDark,
          border:"none",borderRadius:11,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>Speichern</button>
        <button onClick={()=>setStep("input")} style={{flex:1,padding:13,background:"none",
          border:`1px solid ${B.border}`,borderRadius:11,color:B.muted,fontSize:14,cursor:"pointer"}}>← Neu</button>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function DashboardView({jobs,filterStatus,setFilterStatus,onDetail}) {
  const filtered = filterStatus==="Alle"?jobs:jobs.filter(j=>j.status===filterStatus);
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        {["Alle",...STATUSES].map(st=>(
          <button key={st} onClick={()=>setFilterStatus(st)} style={{padding:"4px 11px",borderRadius:20,
            border:`1px solid ${filterStatus===st?B.greenMid:B.border}`,
            background:filterStatus===st?B.greenSubtle:"none",
            color:filterStatus===st?B.green:B.muted,fontSize:12,cursor:"pointer"}}>{st}</button>
        ))}
      </div>
      {filtered.length===0 && <div style={{color:B.border,textAlign:"center",padding:"40px 16px",fontSize:14}}>Noch keine Jobs. Tippe ＋ um loszulegen.</div>}
      {filtered.map(j=><JobCard key={j.id} job={j} onTap={()=>onDetail(j)}/>)}
    </div>
  );
}

function JobCard({job,onTap}) {
  const m=SM[job.status]||SM.Offen;
  return (
    <div onClick={onTap} style={{background:B.dark,border:`1px solid ${B.border}`,borderLeft:`3px solid ${m.accent}`,
      borderRadius:13,padding:"12px 14px",marginBottom:10,cursor:"pointer",animation:"fadeUp .2s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <div style={{fontSize:15,fontWeight:700}}>{job.firma}</div>
          <div style={{fontSize:13,color:B.muted,marginTop:2}}>{job.rolle}</div>
        </div>
        <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:12,
          fontSize:11,fontWeight:600,background:m.bg,color:m.dot,border:`1px solid ${m.accent}`,whiteSpace:"nowrap"}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:m.dot,display:"inline-block"}}/>
          {job.status}
        </span>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"3px 12px",fontSize:12,color:B.slate}}>
        {job.standort    && <span>📍 {job.standort}</span>}
        {job.gehalt      && <span>💶 {job.gehalt}</span>}
        {job.fit         && <span>🎯 Fit {job.fit}%</span>}
        {job.offerChance && <span>📊 {job.offerChance}%</span>}
      </div>
    </div>
  );
}

// ── Kanban ────────────────────────────────────────────────────────────────────
function KanbanView({jobs,onDetail}) {
  return (
    <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:12}}>
      {STATUSES.map(st=>{
        const m=SM[st], col=jobs.filter(j=>j.status===st);
        return (
          <div key={st} style={{minWidth:150,flex:"0 0 150px",background:B.dark,borderRadius:10,
            padding:10,borderTop:`2px solid ${m.accent}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{color:m.dot,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{st}</span>
              <span style={{background:m.bg,color:m.dot,border:`1px solid ${m.accent}`,
                borderRadius:10,fontSize:11,fontWeight:700,padding:"1px 7px"}}>{col.length}</span>
            </div>
            {col.length===0 && <div style={{color:"#1f2937",fontSize:12,padding:"6px 0",textAlign:"center"}}>—</div>}
            {col.map(j=>(
              <div key={j.id} onClick={()=>onDetail(j)} style={{background:B.darker,borderRadius:8,
                padding:"8px 10px",marginBottom:8,cursor:"pointer"}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>{j.firma}</div>
                <div style={{fontSize:11,color:B.muted}}>{j.rolle}</div>
                {j.fit && <div style={{fontSize:10,color:B.greenMid,marginTop:4,fontWeight:600}}>🎯 {j.fit}%</div>}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function StatsView({jobs}) {
  const total=jobs.length;
  const wf=jobs.filter(j=>j.fit), wc=jobs.filter(j=>j.offerChance);
  const avgFit    = wf.length?Math.round(wf.reduce((a,j)=>a+Number(j.fit),0)/wf.length):null;
  const avgChance = wc.length?Math.round(wc.reduce((a,j)=>a+Number(j.offerChance),0)/wc.length):null;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
        {[["Gesamt",total,B.green],["Interviews",jobs.filter(j=>j.status==="Interview").length,"#60a5fa"],
          ["Ø CV-Fit",avgFit!==null?`${avgFit}%`:"–","#fbbf24"],["Ø Chance",avgChance!==null?`${avgChance}%`:"–","#c084fc"]
        ].map(([l,v,a])=>(
          <div key={l} style={{background:B.dark,borderRadius:12,padding:"14px 16px",borderTop:`2px solid ${a}`}}>
            <div style={{color:a,fontSize:26,fontWeight:800,fontFamily:"monospace"}}>{v}</div>
            <div style={{color:B.muted,fontSize:12,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:B.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Status-Übersicht</div>
      {STATUSES.map(st=>{
        const m=SM[st],cnt=jobs.filter(j=>j.status===st).length,pct=total?Math.round(cnt/total*100):0;
        return (
          <div key={st} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{color:m.dot,fontSize:13}}>{st}</span>
              <span style={{color:B.muted,fontSize:13}}>{cnt}</span>
            </div>
            <div style={{background:B.border,borderRadius:4,height:5}}>
              <div style={{background:m.accent,width:`${pct}%`,height:5,borderRadius:4,transition:"width .5s"}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Docs ──────────────────────────────────────────────────────────────────────
function DocsView({docs,setDocs,cv,setCv,showToast}) {
  const docRef=useRef(), cvRef=useRef();

  function upload(e) {
    Array.from(e.target.files).forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>{ setDocs(d=>[...d,{id:uid(),name:file.name,type:file.type,size:file.size,data:ev.target.result,datum:today()}]); showToast(`${file.name} ✓`); };
      r.readAsDataURL(file);
    });
    e.target.value="";
  }

  function replaceCv(e) {
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=ev=>{ const d=ev.target.result; setCv({name:file.name,type:file.type,data:d.split(",")[1],dataUrl:d,datum:today()}); showToast("CV aktualisiert ✓"); };
    r.readAsDataURL(file);
    e.target.value="";
  }

  function del(id){ setDocs(d=>d.filter(x=>x.id!==id)); showToast("Gelöscht"); }
  function icon(t){ return t.includes("pdf")?"📄":t.includes("image")?"🖼️":t.includes("word")||t.includes("document")?"📝":"📎"; }
  function fmtSz(b){ return b<1024?`${b} B`:b<1048576?`${(b/1024).toFixed(1)} KB`:`${(b/1048576).toFixed(1)} MB`; }

  const rowStyle={display:"flex",alignItems:"center",gap:12,background:B.dark,borderRadius:11,padding:"10px 13px",marginBottom:8};
  const secTitle={fontSize:11,color:B.muted,fontWeight:700,marginBottom:10,textTransform:"uppercase",letterSpacing:1};

  return (
    <div>
      <div style={secTitle}>Mein Lebenslauf</div>
      <div style={{...rowStyle,border:`1px solid ${B.greenMid}`,marginBottom:18}}>
        <span style={{fontSize:22}}>📄</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cv.name}</div>
          <div style={{color:B.muted,fontSize:11}}>Aktiver CV · {cv.datum}</div>
        </div>
        <button onClick={()=>cvRef.current.click()} style={{background:"none",border:"none",color:B.green,fontSize:12,cursor:"pointer"}}>Ersetzen</button>
      </div>
      <input ref={cvRef} type="file" style={{display:"none"}} accept=".pdf,.doc,.docx" onChange={replaceCv}/>

      <div style={secTitle}>Weitere Dokumente</div>
      <button onClick={()=>docRef.current.click()} style={{width:"100%",padding:12,background:B.greenSubtle,
        border:`1px dashed ${B.greenMid}`,borderRadius:11,color:B.green,fontSize:14,cursor:"pointer",marginBottom:16}}>
        ↑ Dokument hochladen
      </button>
      <input ref={docRef} type="file" style={{display:"none"}} multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png" onChange={upload}/>

      {docs.length===0 && <div style={{color:B.border,textAlign:"center",padding:"30px 16px",fontSize:14}}>Anschreiben, Zeugnisse etc. hier ablegen.</div>}
      {docs.map(d=>(
        <div key={d.id} style={rowStyle}>
          <span style={{fontSize:22}}>{icon(d.type)}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</div>
            <div style={{color:B.muted,fontSize:11}}>{fmtSz(d.size)} · {d.datum}</div>
          </div>
          <button onClick={()=>del(d.id)} style={{background:"none",border:"none",color:"#f87171",fontSize:16,cursor:"pointer"}}>✕</button>
        </div>
      ))}
    </div>
  );
}

// ── Detail ────────────────────────────────────────────────────────────────────
function DetailView({job,onDelete,onBack,updateStatus}) {
  const m=SM[job.status]||SM.Offen;
  return (
    <div style={{paddingBottom:40}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:B.green,fontSize:14,cursor:"pointer",padding:"0 0 16px"}}>← Zurück</button>
      <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:12,
        fontSize:11,fontWeight:600,background:m.bg,color:m.dot,border:`1px solid ${m.accent}`}}>
        <span style={{width:5,height:5,borderRadius:"50%",background:m.dot,display:"inline-block"}}/>{job.status}
      </span>
      <div style={{fontSize:22,fontWeight:800,marginTop:8,marginBottom:2}}>{job.firma}</div>
      <div style={{color:B.textSub,fontSize:16,marginBottom:18}}>{job.rolle}</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[["📍","Standort",job.standort],["💶","Gehalt",job.gehalt],
          ["🎯","CV-Fit",job.fit?`${job.fit}%`:null],["📊","Offer-Chance",job.offerChance?`${job.offerChance}%`:null],
          ["📅","Datum",job.datum]].filter(x=>x[2]).map(([icon,l,v])=>(
          <div key={l} style={{background:B.dark,borderRadius:9,padding:"9px 11px",display:"flex",gap:8,alignItems:"flex-start"}}>
            <span>{icon}</span>
            <div>
              <div style={{color:B.slate,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>{l}</div>
              <div style={{fontSize:13,marginTop:1}}>{v}</div>
            </div>
          </div>
        ))}
      </div>

      {job.notizen && (
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:B.slate,marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Notizen</div>
          <div style={{color:B.textSub,fontSize:14,lineHeight:1.65}}>{job.notizen}</div>
        </div>
      )}

      <div style={{fontSize:11,color:B.slate,marginBottom:8,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6}}>Status ändern</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:24}}>
        {STATUSES.map(st=>{const m2=SM[st];return(
          <button key={st} onClick={()=>updateStatus(job.id,st)} style={{padding:"4px 11px",borderRadius:20,
            border:`1px solid ${job.status===st?m2.accent:B.border}`,background:job.status===st?m2.bg:"none",
            color:job.status===st?m2.dot:B.muted,fontSize:12,cursor:"pointer"}}>{st}</button>
        );})}
      </div>

      <button onClick={()=>{if(confirm("Job löschen?"))onDelete(job.id);}} style={{width:"100%",padding:13,
        background:"none",border:"1px solid #dc2626",borderRadius:11,color:"#f87171",fontSize:14,cursor:"pointer"}}>
        Löschen
      </button>
    </div>
  );
}

function Spin() {
  return <span style={{display:"inline-block",width:12,height:12,border:"2px solid rgba(255,255,255,.3)",
    borderTopColor:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite",marginRight:6}}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
